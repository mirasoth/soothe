# =============================================================================
# Soothe Configuration
# =============================================================================
# Use: soothe run --config config/config.yml
# All values are defaults unless noted. Remove sections you don't need.

# =============================================================================
# Model Providers
# =============================================================================
# Define LLM providers. api_key and api_base_url support ${ENV_VAR} syntax.
# Set at least one provider with its API key.

providers:
  - name: coding-plan
    provider_type: openai
    api_key: "${DASHSCOPE_CP_API_KEY}"
    api_base_url: "${DASHSCOPE_CP_BASE_URL}"
    models:
      - glm-5
      - qwen3.5-plus
      - MiniMax-M2.5

  - name: dashscope
    provider_type: openai
    api_key: "${DASHSCOPE_API_KEY}"
    api_base_url: "${DASHSCOPE_BASE_URL}"
    models:
      - glm-5
      - qwen3.5-plus
      - qwen3.5-flash
      - MiniMax-M2.5
      - text-embedding-v4

# =============================================================================
# Model Router
# =============================================================================
# Maps roles to "provider:model". Unset roles fall back to "default".

router:
  default: "coding-plan:glm-5"
  think: "coding-plan:glm-5"
  fast: "dashscope:qwen3.5-flash"
  image: "coding-plan:qwen3.5-plus"
  embedding: "dashscope:text-embedding-v4"

# =============================================================================
# Agent Behavior
# =============================================================================

embedding_dims: 1536
# assistant_name: Soothe
# system_prompt: "Custom system prompt override."
workspace_dir: "."
debug: false
activity_max_lines: 300

# =============================================================================
# Subagents
# =============================================================================
# All subagents are enabled by default. Set enabled: false to disable.

subagents:
  research:
    enabled: true
  planner:
    enabled: true
  scout:
    enabled: true
  browser:
    enabled: true
    config:
      runtime_dir: ""  # Empty = use SOOTHE_HOME/agents/browser/
      downloads_dir: ""  # Empty = runtime_dir/downloads/
      user_data_dir: ""  # Empty = runtime_dir/profiles/default/
      extensions_dir: ""  # Empty = runtime_dir/extensions/
      cleanup_on_exit: true  # Clean temp files on session end
      disable_extensions: true  # Disable uBlock Origin, cookie handler, ClearURLs
      disable_cloud: true  # Disable browser-use cloud service
      disable_telemetry: true  # Disable anonymous usage telemetry
      enable_existing_browser: true  # Allow connecting to existing Chrome via CDP
      profile_mode: ephemeral  # for concurrent browser tasks
  claude:
    enabled: true
    # Claude subagent uses ANTHROPIC_API_KEY and model from environment
    # Set environment variables: ANTHROPIC_API_KEY, ANTHROPIC_MODEL (optional)
    # No model configuration needed here

  skillify:
    enabled: true
    # config:
    #   warehouse_paths: []
    #   index_interval_seconds: 300
    #   index_collection: soothe_skillify
    #   retrieval_top_k: 10

  weaver:
    enabled: true
    # config:
    #   generated_agents_dir: ~/.soothe/generated_agents
    #   reuse_threshold: 0.85
    #   reuse_collection: soothe_weaver_reuse
    #   max_generation_attempts: 2
    #   allowed_tool_groups: []
    #   allowed_mcp_servers: []
    #   cleanup_old_agents_days: 30
    #   max_generated_agents: 100

# =============================================================================
# Tools
# =============================================================================
# Enable tool groups. Some require API keys (see config/env.example).
# Default tools are powerful and require no external API keys (except wizsearch).

tools:
  # Core tools (no external dependencies)
  - datetime          # Current date/time for time-awareness
  - file_edit         # Create, read, delete, search files with backup
  - python_executor   # Execute Python code with matplotlib support
  - cli               # Persistent CLI shell execution
  - tabular           # Inspect and validate tabular data (CSV, Excel, etc.)
  - document          # Extract text from documents (PDF, DOCX, etc.)

  # Web accesses (wizsearch taivily engine requires API key)
  - wizsearch         # Multi-engine web search and page crawling
  - wikipedia         # Encyclopedia lookup (no API key)
  - arxiv             # Academic paper search (no API key)

  # Optional tools (require API keys or external services):
  # - serper          # Google search via Serper (SERPER_API_KEY)
  # - jina            # Web page reader via Jina (JINA_API_KEY)
  # - image           # Image analysis (OpenAI GPT-4o)
  # - audio           # Audio transcription (OpenAI Whisper)
  # - video           # Video analysis (Google Gemini)
  # - github          # GitHub API (GITHUB_TOKEN)

# =============================================================================
# Tools Settings
# =============================================================================
# Configure individual tool groups with specific settings.

tools_settings:
  wizsearch:
    enabled: true
    default_engines:
      - tavily          # Requires TAVILY_API_KEY (set in environment)
      - duckduckgo      # No API key required
    max_results_per_engine: 10
    timeout: 30

# =============================================================================
# MCP Servers
# =============================================================================

mcp_servers: []
  # - command: npx
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
  #   transport: stdio
  # - url: http://localhost:3000/mcp
  #   transport: sse

# =============================================================================
# Skills & Memory
# =============================================================================

skills: []
memory: []

# =============================================================================
# Persistence Configuration
# =============================================================================
# Unified persistence settings for all backends. PostgreSQL is recommended
# for production deployments with persistence requirements.

persistence:
  # PostgreSQL DSN for Soothe metadata backends
  # (checkpointer, context, memory, durability/thread state)
  soothe_postgres_dsn: "postgresql://postgres:postgres@localhost:5432/soothe"

  # PostgreSQL DSN for pgvector vector storage
  # (used when vector_store_provider=pgvector and vector_store_config.dsn is omitted)
  vector_postgres_dsn: "postgresql://postgres:postgres@localhost:5432/vectordb"

  # Default backend for new protocols (can be overridden per-protocol below)
  # Options: json (simple files), rocksdb (embedded KV), postgresql (production)
  default_backend: postgresql

# =============================================================================
# Protocol Backends
# =============================================================================
# Configure the backend implementations for each core protocol.
# All protocols support multiple backends with different tradeoffs.

protocols:
  # Planner Protocol: Task decomposition and execution planning
  planner:
    routing: auto  # auto | always_direct | always_planner | always_claude

  # Policy Protocol: Permission management and access control
  policy:
    profile: standard  # Named profile from policy_profiles.yml

  # Context Protocol: Accumulates and projects knowledge within a thread
  context:
    backend: vector-postgresql  # {behavior}-{storage}: keyword-json, keyword-rocksdb, keyword-postgresql, vector-postgresql, none
    persist_dir: ""   # Empty = SOOTHE_HOME/context/

  # Memory Protocol: Cross-thread long-term memory
  memory:
    backend: vector-postgresql  # {behavior}-{storage}: keyword-json, keyword-rocksdb, keyword-postgresql, vector-postgresql, none
    persist_dir: ""   # Empty = SOOTHE_HOME/memory/

  # Durability Protocol: Thread lifecycle and state persistence
  durability:
    backend: postgresql  # json | rocksdb | postgresql
    persist_dir: ""  # Empty = SOOTHE_HOME/durability/
    checkpointer: postgresql  # LangGraph checkpoint backend

# =============================================================================
# Autonomous Operation
# =============================================================================
# Configure autonomous iteration for long-running tasks. By default, requires
# explicit user activation per thread for safety.

autonomous:
  enabled_by_default: true   # New threads start in autonomous mode
  max_iterations: 10         # Stop after N iterations without user input
  max_retries: 2             # Retry failed goals before giving up
  max_total_goals: 50        # Maximum goals allowed (RFC-0011)
  max_goal_depth: 5          # Maximum hierarchy depth (RFC-0011)
  enable_dynamic_goals: true # Enable/disable dynamic goal creation (RFC-0011)

# =============================================================================
# Logging & Observability
# =============================================================================
# Configure logging, thread history, and debugging features.

logging:
  level: INFO              # Python logging level (DEBUG, INFO, WARNING, ERROR)
  file: ""                 # Empty = SOOTHE_HOME/logs/soothe.log
  progress_verbosity: normal  # minimal | normal | detailed | debug

  # Thread conversation logging for audit and recovery
  thread_logging:
    enabled: true
    dir: ""                # Empty = SOOTHE_HOME/runs/{thread_id}/
    retention_days: 30     # Auto-delete threads older than N days
    max_size_mb: 100       # Max total size (not enforced yet)

# =============================================================================
# Execution Limits
# =============================================================================
# Concurrency and resource limits for safe operation.

execution:
  concurrency:
    max_parallel_goals: 1         # Max goals running simultaneously (autonomous mode)
    max_parallel_steps: 1         # Max parallel plan steps (DAG-aware)
    max_parallel_subagents: 1     # Max subagents running simultaneously (reserved)
    max_parallel_tools: 3         # Max tools in parallel per step (reserved)
    global_max_llm_calls: 5       # Cross-level LLM call circuit breaker
    step_parallelism: dependency  # sequential | dependency | max
  recovery:
    progressive_checkpoints: true   # Save checkpoint after each step/goal (RFC-0010)
    auto_resume_on_start: false     # Auto-resume incomplete threads on daemon start

# =============================================================================
# Vector Store
# =============================================================================

vector_store_provider: none
vector_store_collection: soothe_default
# vector_store_config:
#   # Optional override. If omitted for pgvector, uses persistence.vector_postgres_dsn.
#   dsn: "postgresql://postgres:postgres@localhost:5432/vectordb"
#   url: "http://localhost:8080"
