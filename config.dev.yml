# =============================================================================
# Soothe Configuration
# =============================================================================
# Use: soothe --config config/config.yml
# All values are defaults unless noted. Remove sections you don't need.

# =============================================================================
# Model Providers
# =============================================================================
# Define LLM providers. api_key and api_base_url support ${ENV_VAR} syntax.
# Set at least one provider with its API key.

providers:
  - name: dashscope
    provider_type: openai
    api_base_url: "${DASHSCOPE_BASE_URL}"
    api_key: "${DASHSCOPE_API_KEY}"
    models:
      - qwen-max
      - qwen3.5-flash
      - qwen3.5-plus
      - MiniMax-M2.5
      - kimi-k2.5
      - multimodal-embedding-v1

  - name: coding-plan
    provider_type: openai
    api_base_url: "${DASHSCOPE_CP_BASE_URL}"
    api_key: "${DASHSCOPE_CP_API_KEY}"
    models:
      - glm-5
      - qwen3.5-plus
      - kimi-k2.5
      - MiniMax-M2.5
      - deepseek-v3.2

  # Ollama (local models):
  # - name: ollama
  #   provider_type: ollama
  #   api_base_url: http://localhost:11434
  #   models: [llama3.2, qwen3:8b, deepseek-r1:14b, nomic-embed-text:latest]

  # Anthropic:
  # - name: anthropic
  #   provider_type: anthropic
  #   api_key: "${ANTHROPIC_API_KEY}"
  #   models: [claude-sonnet-4-20250514]

# =============================================================================
# Model Router
# =============================================================================
# Maps roles to "provider:model". Unset roles fall back to "default".

router:
  default: "coding-plan:kimi-k2.5"
  think: "coding-plan:qwen3.5-plus"
  fast: "coding-plan:kimi-k2.5"
  image: "coding-plan:qwen3.5-plus"
  embedding: "dashscope:multimodal-embedding-v1"

# =============================================================================
# Agent Behavior
# =============================================================================

embedding_dims: 1536
# assistant_name: Soothe
# system_prompt: "Custom system prompt override."
workspace_dir: "."
debug: false
activity_max_lines: 300

# =============================================================================
# Subagents
# =============================================================================
# All subagents are enabled by default. Set enabled: false to disable.

subagents:
  browser:
    enabled: true
    config:
      runtime_dir: ""  # Empty = use SOOTHE_HOME/agents/browser/
      downloads_dir: ""  # Empty = runtime_dir/downloads/
      user_data_dir: ""  # Empty = runtime_dir/profiles/default/
      extensions_dir: ""  # Empty = runtime_dir/extensions/
      cleanup_on_exit: true  # Clean temp files on session end
      disable_extensions: true  # Disable uBlock Origin, cookie handler, ClearURLs
      disable_cloud: true  # Disable browser-use cloud service
      disable_telemetry: true  # Disable anonymous usage telemetry
      enable_existing_browser: true  # Allow connecting to existing Chrome via CDP
      profile_mode: ephemeral  # for concurrent browser tasks

  claude:
    enabled: true
    # Claude subagent uses ANTHROPIC_API_KEY and model from environment
    # Set environment variables: ANTHROPIC_API_KEY, ANTHROPIC_MODEL (optional)
    # No model configuration needed here

  research:
    enabled: true
    # Research subagent for deep multi-source iterative research
    # Uses the InquiryEngine for comprehensive investigation
    # No additional configuration needed - uses web_search tool settings

# =============================================================================
# Tools Configuration
# =============================================================================
# Enable/disable tool groups and configure their settings.
# Each tool group can be enabled/disabled via the 'enabled' flag.

tools:
  # Consolidated execution tools
  execution:
    enabled: true       # run_command, run_python, run_background, kill_process

  # Consolidated file operations
  file_ops:
    enabled: true       # read_file, write_file, delete_file, search_files, list_files, file_info

  # Consolidated surgical editing tools
  code_edit:
    enabled: true       # edit_file_lines, insert_lines, delete_lines, apply_diff

  # Data operations
  datetime:
    enabled: true       # Current date/time for time-awareness
  data:
    enabled: true       # Inspect tabular data (CSV, Excel) and documents (PDF, DOCX)

  # Research
  web_search:
    enabled: true
    default_engines:
      - tavily          # Requires TAVILY_API_KEY (set in environment)
      - duckduckgo      # No API key required
    max_results_per_engine: 10
    timeout: 30
  research:
    enabled: true       # Deep multi-source iterative research (InquiryEngine)

  # Optional tools (require API keys or external services):
  image:
    enabled: true   # Image analysis (OpenAI GPT-4o)
  audio:
    enabled: true   # Audio transcription (OpenAI Whisper)
  video:
    enabled: true   # Video analysis (Google Gemini)
  github:
    enabled: true   # GitHub API (GITHUB_TOKEN)

# =============================================================================
# MCP Servers
# =============================================================================

mcp_servers: []
  # - command: npx
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
  #   transport: stdio
  # - url: http://localhost:3000/mcp
  #   transport: sse

# =============================================================================
# Skills & Memory
# =============================================================================

skills: []
memory: []

# =============================================================================
# Security Configuration
# =============================================================================
# Configure filesystem access control and security policies.

security:
  # Allow access to paths outside the workspace directory
  allow_paths_outside_workspace: true
  # Require user approval for paths outside workspace (when above is true)
  require_approval_for_outside_paths: false

  # Path-based access control (glob patterns)
  # Evaluation order: 1) denied_paths (highest priority), 2) allowed_paths, 3) workspace boundary
  denied_paths:
    - "~/.ssh/**"           # SSH keys
    - "~/.gnupg/**"         # GPG keys
    - "~/.aws/**"           # AWS credentials
    - "**/.env"             # Environment files
    - "**/credentials.json" # Credentials files
    - "**/secrets.json"     # Secrets files
  allowed_paths:
    - "**"                  # Allow all paths (can be restricted for tighter security)

  # File type restrictions
  denied_file_types: []     # File extensions that are completely denied
  require_approval_for_file_types:  # File extensions requiring user approval
    - ".env"
    - ".pem"
    - ".key"
    - ".p12"
    - ".pfx"
    - ".crt"

# =============================================================================
# Protocol Backends
# =============================================================================
# Configure the backend implementations for each core protocol.
# All protocols support multiple backends with different tradeoffs.

protocols:
  # Planner Protocol: Task decomposition and execution planning
  planner:
    routing: auto  # auto | always_direct | always_planner | always_claude

  # Policy Protocol: Permission management and access control
  policy:
    profile: standard  # Named profile from policy_profiles.yml

  # Context Protocol: Accumulates and projects knowledge within a thread
  context:
    enabled: true
    backend: keyword-sqlite  # {behavior}-{storage}: keyword-json, keyword-sqlite, keyword-rocksdb, keyword-postgresql, vector-sqlite, vector-postgresql, none
    persist_dir: ""   # Empty = SOOTHE_HOME/context/

  # Memory Protocol: Cross-thread long-term memory
  memory:
    enabled: true
    backend: vector-postgresql  # {behavior}-{storage}: keyword-json, keyword-rocksdb, keyword-postgresql, vector-postgresql, none
    persist_dir: ""   # Empty = SOOTHE_HOME/memory/
    # Use Soothe's model router roles (configured in router section above)
    # llm_chat_role: fast  # Use fast model for memory operations (default)
    # llm_embed_role: embedding  # Use embedding model for vector operations (default)

  # Durability Protocol: Thread lifecycle and state persistence
  durability:
    backend: sqlite  # json | rocksdb | postgresql | sqlite
    persist_dir: ""  # Empty = SOOTHE_HOME/durability/
    checkpointer: sqlite  # LangGraph checkpoint backend: postgresql | sqlite | memory
    thread_inactivity_timeout_hours: 72  # Hours before inactive threads are suspended

# =============================================================================
# Persistence Configuration
# =============================================================================
# Unified persistence settings for protocol backends (not vector stores).
# PostgreSQL is recommended for production deployments.

persistence:
  # Default backend for new protocols (can be overridden per-protocol below)
  # Options: json (simple files), rocksdb (embedded KV), sqlite (local default), postgresql (production)
  default_backend: sqlite
  # sqlite_path: ""  # Empty = SOOTHE_HOME/soothe.db

  # PostgreSQL DSN for Soothe metadata backends
  # (checkpointer, durability, keyword context/memory backends)
  soothe_postgres_dsn: "postgresql://postgres:postgres@localhost:5432/soothe"

# =============================================================================
# Vector Store Providers
# =============================================================================
# Define named vector store backends for VectorContext.
# Similar to LLM providers, each vector store has a type and configuration.
# Use vector_store_router to assign components to providers.

vector_stores:
  - name: pgvector_default
    provider_type: pgvector
    dsn: "postgresql://postgres:postgres@localhost:5432/vectordb"  # Required for pgvector
    pool_size: 5
    index_type: hnsw

vector_store_router:
  # Map component roles to "provider_name:collection_name"
  # Roles: context (VectorContext)
  #
  # Format: "provider_name:collection_name"
  # - provider_name must match a name from vector_stores list above
  # - collection_name is specific to each component
  #
  # All roles use pgvector with the configured DSN by default
  default: pgvector_default:soothe_default
  context: pgvector_default:soothe_context

# =============================================================================
# Agentic Loop Configuration (RFC-201)
# =============================================================================

agentic:
  max_iterations: 10         # Maximum agentic loop iterations

# =============================================================================
# Autonomous Operation
# =============================================================================
# Configure autonomous iteration for long-running tasks. By default, requires
# explicit user activation per thread for safety.

autonomous:
  enabled_by_default: false  # New threads start in autonomous mode
  max_iterations: 10         # Stop after N iterations without user input
  max_retries: 2             # Retry failed goals before giving up
  max_total_goals: 50        # Maximum goals allowed (RFC-0007 §5.6)
  max_goal_depth: 5          # Maximum hierarchy depth (RFC-0007 §5.6)
  enable_dynamic_goals: true # Enable/disable dynamic goal creation (RFC-0007 §5.4)

# =============================================================================
# Performance & Startup
# =============================================================================
# Tune agent startup and runtime performance optimizations.

performance:
  enabled: true                      # Master switch for all performance optimizations
  unified_classification: true       # Enable LLM-based query classification
  classification_mode: llm           # llm | disabled
  optimize_system_prompts: true      # Enable dynamic system prompt adjustment
  template_planning: true            # Use template plans for simple queries
  parallel_pre_stream: true          # Run memory/context operations in parallel
  parallel_tool_loading: true        # Load tool groups concurrently at startup
  parallel_subagent_loading: true    # Load subagent specs concurrently at startup
  parallel_protocol_resolution: true # Resolve protocols in parallel at startup

# =============================================================================
# Execution Limits
# =============================================================================
# Concurrency and resource limits for safe operation.

execution:
  concurrency:
    max_parallel_goals: 1         # Max goals running simultaneously (autonomous mode)
    max_parallel_steps: 1         # Max parallel plan steps (DAG-aware)
    max_parallel_subagents: 3     # Max subagents running simultaneously (reserved)
    global_max_llm_calls: 9       # Cross-level LLM call circuit breaker
    step_parallelism: dependency  # sequential | dependency | max
  recovery:
    progressive_checkpoints: true   # Save checkpoint after each step/goal (RFC-0010)
    auto_resume_on_start: false     # Auto-resume incomplete threads on daemon start

# =============================================================================
# Logging & Observability
# =============================================================================
# Configure logging, thread history, and debugging features.

logging:
  # Backend file logging (Python logging module)
  file:
    level: DEBUG              # File logging level (DEBUG, INFO, WARNING, ERROR)
    path: ""                 # Empty = SOOTHE_HOME/logs/soothe.log
    max_bytes: 10485760      # 10 MB before rotation
    backup_count: 3          # Number of rotating backups

  # Console logging (disabled by default for TUI compatibility)
  console:
    enabled: false           # Enable to see backend logs in terminal
    level: INFO           # Console logging level (typically higher than file)
    stream: stderr           # stdout or stderr
    format: "%(levelname)-8s %(name)s %(message)s"

  # Progress event visibility (TUI/headless activity display)
  verbosity: normal  # minimal | normal | detailed | debug

  # Thread conversation logging for audit and recovery
  thread_logging:
    enabled: true
    dir: ""                  # Empty = SOOTHE_HOME/runs/{thread_id}/
    retention_days: 30       # Auto-delete threads older than N days
    max_size_mb: 100         # Max total size (not enforced yet)

  # Report output configuration
  report_output:
    # Maximum characters to display in terminal before saving to file
    # Default: 20000 (20KB) - increase for larger reports
    # Set to 0 to always save to file
    display_threshold: 20000

    # Characters to show in preview when report is saved to file
    # Default: 500
    preview_chars: 500

    # Maximum characters for LLM-synthesized reports
    # Default: 0 (unlimited) - LLM prompt already constrains report size
    # Set to a value > 0 to enforce hard limit
    synthesis_max_chars: 0

# =============================================================================
# Daemon Multi-Transport Configuration (RFC-0013)
# =============================================================================
# Configure daemon communication protocols for CLI, web UIs, and remote access.
# WebSocket is the required bidirectional transport for all clients.
# HTTP REST provides optional health checks and CRUD operations.

daemon:
  # Multi-threading (RFC-402) - Enable parallel query execution
  multi_threading_enabled: true
  max_concurrent_threads: 4

  # Transport Layer Configuration
  transports:
    # WebSocket - Required bidirectional transport for all clients
    websocket:
      enabled: true         # Enable WebSocket server (required)
      host: "127.0.0.1"     # Bind address (127.0.0.1 = localhost only)
      port: 8765            # WebSocket port
      tls_enabled: false    # Enable TLS (wss://) - recommended for remote access
      tls_cert: null        # Path to TLS certificate file
      tls_key: null         # Path to TLS private key file
      cors_origins:         # Allowed CORS origins (pattern matching supported)
        - "http://localhost:*"
        - "http://127.0.0.1:*"

    # HTTP REST API - For CRUD operations and file management
    http_rest:
      enabled: false        # Enable HTTP REST server (default: false)
      host: "127.0.0.1"     # Bind address (127.0.0.1 = localhost only)
      port: 8766            # HTTP REST port
      tls_enabled: false    # Enable TLS (https://) - recommended for remote access
      tls_cert: null        # Path to TLS certificate file
      tls_key: null         # Path to TLS private key file
      cors_origins:         # Allowed CORS origins (pattern matching supported)
        - "http://localhost:*"
        - "http://127.0.0.1:*"
