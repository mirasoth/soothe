# Development Configuration - Essential dev settings only
# Inherits defaults from src/soothe/config/config.yml
providers:
  - name: dashscope
    provider_type: openai
    api_base_url: "${DASHSCOPE_BASE_URL}"
    api_key: "${DASHSCOPE_API_KEY}"
    models:
      - qwen-max
      - qwen3.5-flash
      - qwen3.5-plus
      - MiniMax-M2.5
      - kimi-k2.5
      - multimodal-embedding-v1

  - name: coding-plan
    provider_type: openai
    api_base_url: "${DASHSCOPE_CP_BASE_URL}"
    api_key: "${DASHSCOPE_CP_API_KEY}"
    models:
      - glm-5
      - qwen3.5-plus
      - kimi-k2.5
      - MiniMax-M2.5
      - deepseek-v3.2

  - name: mlxserver
    provider_type: limited_openai
    api_base_url: "http://100.75.70.86:9271/v1"
    api_key: "fakeapikey"
    models:
      - glm-4.7-flash
      - glm-4.6v-flash
      - nomic-embed

router:
  default: "coding-plan:kimi-k2.5"
  fast: "coding-plan:kimi-k2.5"
  think: "coding-plan:glm-5"
  image: "coding-plan:qwen3.5-plus"
  embedding: "dashscope:multimodal-embedding-v1"

# router:
#   default: "mlxserver:glm-4.7-flash"
#   fast: "mlxserver:glm-4.7-flash"
#   think: "mlxserver:glm-4.7-flash"
#   image: "mlxserver:glm-4.6v-flash"
#   embedding: "mlxserver:nomic-embed"

agentic:
  final_response: adaptive

# Output streaming configuration (RFC-614)
output_streaming:
  enabled: true        # Enable streaming for all outputs
  mode: streaming      # streaming or batch display mode
  execution_streaming: true   # Stream execution phase
  synthesis_streaming: true   # Stream synthesis phase
  tool_response_streaming: false  # Experimental: stream tool responses

performance:
  enabled: true
  unified_classification: true
  classification_mode: llm
  optimize_system_prompts: true
  parallel_pre_stream: true
  reject_done_at_iteration_zero: false  # Guard: Reject 'done' at iteration 0 with no execution (IG-053)

llm_tracing:
  enabled: true
  log_preview_length: 1000

daemon:
  max_concurrent_threads: 100
  # IG-258: Concurrent performance optimization
  max_input_queue_size: 1000         # Maximum pending input messages (0 = unlimited)
  max_concurrent_dispatches: 50      # Maximum concurrent message handlers
  transports:
    websocket:
      enabled: true
      host: "127.0.0.1"
      port: 8765
    http_rest:
      enabled: true
      host: "127.0.0.1"
      port: 8766

# =============================================================================
# Tools Configuration
# =============================================================================
tools:
  execution:
    enabled: true
  file_ops:
    enabled: true
  datetime:
    enabled: true
  data:
    enabled: true
  wizsearch:
    enabled: true
    default_engines:
      - tavily
  research:
    enabled: true
  image:
    enabled: true
  audio:
    enabled: false
  video:
    enabled: false

# =============================================================================
# Protocol Backends
# =============================================================================
protocols:
  planner:
    routing: auto
  policy:
    profile: standard
  memory:
    enabled: true
    persist_dir: ""
    llm_chat_role: fast
    llm_embed_role: embedding
    enable_embeddings: true
    enable_auto_categorization: true
    enable_category_summaries: true
  durability:
    thread_inactivity_timeout_hours: 72

# =============================================================================
# Persistence Configuration
# =============================================================================
# RFC-612: Multi-database PostgreSQL architecture
persistence:
  default_backend: postgresql  # Use PostgreSQL as default backend

  postgres_base_dsn: "postgresql://postgres:postgres@localhost:6432"

  postgres_databases:
    checkpoints: soothe_checkpoints  # LangGraph + AgentLoop checkpoints (IG-055 shared)
    metadata: soothe_metadata        # Thread metadata (DurabilityProtocol)
    vectors: soothe_vectors          # pgvector embeddings
    memory: soothe_memory            # MemU long-term memory

# =============================================================================
# Vector Store Providers
# =============================================================================
# RFC-612: Vector store DSN auto-resolved from persistence.postgres_base_dsn + vectors database
vector_stores:
  - name: pgvector_default
    provider_type: pgvector
    # DSN auto-resolved from postgres_base_dsn + postgres_databases.vectors
    # No explicit dsn needed when using RFC-612 multi-database architecture
    pool_size: 5
    index_type: hnsw

vector_store_router:
  default: pgvector_default:soothe_default

subagents:
  browser:
    config:
      max_steps: 10

logging:
  file:
    level: DEBUG
  thread_logging:
    enabled: true
    retention_days: 30
