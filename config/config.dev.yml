# Development Configuration - Essential dev settings only
# Inherits defaults from src/soothe/config/config.yml
providers:
  - name: dashscope
    provider_type: openai
    api_base_url: "${DASHSCOPE_BASE_URL}"
    api_key: "${DASHSCOPE_API_KEY}"
    models:
      - qwen-max
      - qwen3.5-flash
      - qwen3.5-plus
      - MiniMax-M2.5
      - kimi-k2.5
      - multimodal-embedding-v1

  - name: coding-plan
    provider_type: openai
    api_base_url: "${DASHSCOPE_CP_BASE_URL}"
    api_key: "${DASHSCOPE_CP_API_KEY}"
    models:
      - glm-5
      - qwen3.5-plus
      - kimi-k2.5
      - MiniMax-M2.5
      - deepseek-v3.2

  - name: mlxserver
    provider_type: limited_openai
    api_base_url: "http://100.75.70.86:9271/v1"
    api_key: "fakeapikey"
    models:
      - glm-4.7-flash
      - glm-4.6v-flash
      - nomic-embed

router:
  default: "coding-plan:kimi-k2.5"
  fast: "coding-plan:kimi-k2.5"
  think: "coding-plan:kimi-k2.5"
  image: "coding-plan:qwen3.5-plus"
  embedding: "dashscope:multimodal-embedding-v1"

# router:
#   default: "mlxserver:glm-4.7-flash"
#   fast: "mlxserver:glm-4.7-flash"
#   think: "mlxserver:glm-4.7-flash"
#   image: "mlxserver:glm-4.6v-flash"
#   embedding: "mlxserver:nomic-embed"

agentic:
  final_response: adaptive
  output_streaming: true  # Default streaming for AgentLoop responses (true=stream, false=batch)
  reject_done_at_iteration_zero: false  # Guard: Reject 'done' at iteration 0 with no execution

execution:
  llm_rpm_limit: 120
  llm_concurrent_limit: 10
  llm_call_timeout_seconds: 60

observability:
  llm_tracing_enabled: true
  llm_tracing_preview_length: 1000
  log_file_level: DEBUG
  verbosity: normal
  console:
    enabled: false
    level: WARNING
    stream: stderr
  global_history:
    enabled: true
    max_size: 5000
    dedup_window: 10
    retention_days: 90
  thread_logging_enabled: true
  thread_logging_retention_days: 30

daemon:
  max_concurrent_threads: 100
  # IG-258: Concurrent performance optimization
  max_input_queue_size: 1000         # Maximum pending input messages (0 = unlimited)
  max_concurrent_dispatches: 50      # Maximum concurrent message handlers
  transports:
    websocket:
      enabled: true
      host: "127.0.0.1"
      port: 8765
    http_rest:
      enabled: true
      host: "127.0.0.1"
      port: 8766

# =============================================================================
# Tools Configuration
# =============================================================================
tools:
  execution:
    enabled: true
  file_ops:
    enabled: true
  datetime:
    enabled: true
  data:
    enabled: true
  wizsearch:
    enabled: true
    default_engines:
      - tavily
  research:
    enabled: true
  image:
    enabled: true
  audio:
    enabled: false
  video:
    enabled: false

# =============================================================================
# Protocol Backends
# =============================================================================
protocols:
  planner:
    routing: auto
  policy:
    profile: standard
  memory:
    enabled: true
    persist_dir: ""
    llm_chat_role: fast
    llm_embed_role: embedding
    enable_embeddings: true
    enable_auto_categorization: true
    enable_category_summaries: true
  durability:
    thread_inactivity_timeout_hours: 72

# =============================================================================
# Persistence Configuration
# =============================================================================
# Development: SQLite for local development (simple setup, no external services)
persistence:
  default_backend: sqlite  # SQLite for development (PostgreSQL for production)

  # SQLite paths (optional - empty uses $SOOTHE_DATA_DIR/*.db)
  # metadata_sqlite_path: ""   # Empty = $SOOTHE_DATA_DIR/metadata.db
  # checkpoint_sqlite_path: "" # Empty = $SOOTHE_DATA_DIR/checkpoints.db

# =============================================================================
# Vector Store Providers
# =============================================================================
# Development: SQLite with sqlite-vec extension for local vector embeddings
# sqlite-vec provides vector similarity search without PostgreSQL/pgvector dependency
vector_stores:
  - name: sqlite_vec_default
    provider_type: sqlite_vec
    # db_path: ""  # Optional: Empty uses $SOOTHE_DATA_DIR/vector.db
    vector_size: 1536  # OpenAI embedding dimension (adjust for your model)
    distance: cosine   # Distance metric: cosine, l2, or ip (inner product)

vector_store_router:
  default: sqlite_vec_default:soothe_default  # Format: "provider_name:collection_name"

subagents:
  browser:
    enabled: false
    config:
      max_steps: 10

# Note: Logging configuration moved to observability section above
