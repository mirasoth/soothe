# Development Configuration - Essential dev settings only
# Inherits defaults from src/soothe/config/config.yml

# Dev environment providers
providers:
  - name: dashscope
    provider_type: openai
    api_base_url: "${DASHSCOPE_BASE_URL}"
    api_key: "${DASHSCOPE_API_KEY}"
    models:
      - qwen-max
      - qwen3.5-flash
      - qwen3.5-plus
      - MiniMax-M2.5
      - kimi-k2.5
      - multimodal-embedding-v1

  - name: coding-plan
    provider_type: openai
    api_base_url: "${DASHSCOPE_CP_BASE_URL}"
    api_key: "${DASHSCOPE_CP_API_KEY}"
    models:
      - glm-5
      - qwen3.5-plus
      - kimi-k2.5
      - MiniMax-M2.5
      - deepseek-v3.2

  - name: lmstudio
    provider_type: openai
    api_base_url: "http://100.75.70.86:1234/v1"
    api_key: "lm-studio"
    models:
      - google/gemma-4-26b-a4b
      - zai-org/glm-4.7-flash
      - zai-org/glm-4.6v-flash
      - text-embedding-nomic-embed-text-v1.5

# Dev model routing
# router:
#   default: "coding-plan:kimi-k2.5"
#   fast: "coding-plan:kimi-k2.5"
#   think: "coding-plan:kimi-k2.5"
#   image: "coding-plan:qwen3.5-plus"
#   embedding: "dashscope:multimodal-embedding-v1"

router:
  default: "lmstudio:zai-org/glm-4.7-flash"
  fast: "lmstudio:zai-org/glm-4.7-flash"
  think: "lmstudio:zai-org/glm-4.7-flash"
  image: "lmstudio:zai-org/glm-4.6v-flash"
  embedding: "lmstudio:text-embedding-nomic-embed-text-v1.5"

# Agentic loop (merged with defaults; see packages/soothe/src/soothe/config/config.yml)
agentic:
  final_response: adaptive

# Dev performance tuning
performance:
  enabled: true
  unified_classification: true
  classification_mode: llm
  optimize_system_prompts: true
  parallel_pre_stream: true

# Dev debugging - enable LLM tracing
llm_tracing:
  enabled: true
  log_preview_length: 1000

# Dev daemon configuration - enable HTTP REST for BM-003 benchmark
daemon:
  max_concurrent_threads: 100
  # IG-258: Concurrent performance optimization
  max_input_queue_size: 1000         # Maximum pending input messages (0 = unlimited)
  max_concurrent_dispatches: 50      # Maximum concurrent message handlers
  transports:
    websocket:
      enabled: true
      host: "127.0.0.1"
      port: 8765
    http_rest:
      enabled: true         # Enable HTTP REST for BM-003 benchmark
      host: "127.0.0.1"
      port: 8766

# Subagent overrides (merged with builtin defaults; see packages/soothe/src/soothe/config/config.yml)
subagents:
  browser:
    config:
      max_steps: 10

# Dev logging - verbose for debugging
# Daemon file logging uses logging.file.level (independent of client display verbosity)
logging:
  file:
    level: DEBUG
  thread_logging:
    enabled: true
    retention_days: 30
