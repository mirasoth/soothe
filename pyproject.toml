[project]
name = "soothe"
version = "0.2.8"
description = "Multi-agent harness built on deepagents and langchain/langgraph."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11,<4.0"
keywords = ["agents", "ai", "llm", "langgraph", "langchain", "multi-agent", "subagents"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "aiohttp>=3.9.0",
    "aiosqlite>=0.22.1",
    "anyio>=3.0.0",
    "bubus>=1.5.6",
    "deepagents>=0.4.10,<1.0.0",
    "fastapi>=0.104.0",
    "langchain-community>=0.3.0,<1.0.0",
    "langchain-core>=1.2.18,<2.0.0",
    "langchain-mcp-adapters>=0.2.0,<1.0.0",
    "langchain-openai>=0.3.0,<1.0.0",
    "langchain>=1.2.11,<2.0.0",
    "langgraph-checkpoint-sqlite>=3.0.0,<4.0.0",
    "langgraph>=1.1.1,<2.0.0",
    "sqlite-vec>=0.1.0",
    "pexpect>=4.9.0",
    "pydantic-settings>=2.0.0,<3.0.0",
    "pydantic>=2.0.0,<3.0.0",
    "pyjwt>=2.8.0",
    "pyperclip>=1.8.0",
    "python-dotenv>=1.0.0,<2.0.0",
    "pyyaml>=6.0.0,<7.0.0",
    "requests>=2.31.0",
    "soothe-sdk>=0.1.3,<1.0.0",
    "textual>=0.40.0",
    "typer>=0.9.0,<1.0.0",
    "uvicorn[standard]>=0.24.0",
    "websockets>=12.0",
]

[project.optional-dependencies]
# -- Tool implementation extras --
research = [
    "arxiv>=2.1.0",
    "langchain-tavily>=0.2.17",
    "tavily-python>=0.5.0",
    "wikipedia>=1.4.0",
    "wizsearch>=1.1.8,<2.0.0",
]
websearch = [
    "browser-use>=0.11.0,<=0.12.0",
    "langchain-tavily>=0.2.17",
    "wizsearch>=1.1.7,<2.0.0",
]
tabular = [
    "openpyxl>=3.1.0",
    "pandas>=2.0.0",
    "pyarrow>=14.0.0",
]
document = [
    "PyMuPDF>=1.24.0",
]
cli = [
    "pexpect>=4.9.0",
]
python-executor = [
    "ipython>=8.0.0",
    "matplotlib>=3.8.0",
]
# -- Subagent / provider extras --
claude = [
    "claude-agent-sdk>=0.1.40,<0.1.49",
]
media = [
    "pillow>=10.0.0",
    "openai>=1.0.0",
]
video = [
    "google-genai>=0.3.0",
]
# -- Persistence / infra extras --
rocksdb = [
    "rocksdict>=0.3",
]
pgvector = [
    "psycopg[pool]>=3.1",
    "pgvector>=0.3",
    "langgraph-checkpoint-postgres>=3.0.0,<4.0.0",
]
weaviate = [
    "weaviate-client>=4.0",
]
ollama = [
    "langchain-ollama>=0.3.0",
]
dashscope = [
    "dashscope>=1.25.14",
]
# -- Meta extras --
all = [
    "soothe[research,websearch,tabular,document,cli,python-executor,claude,media,video,rocksdb,pgvector,weaviate,ollama,dashscope]",
]
# Legacy alias: 'bash' maps to 'cli'
bash = [
    "pexpect>=4.9.0",
]

[dependency-groups]
test = [
    "pytest>=8.0.0",
    "pytest-asyncio>=1.3.0",
    "pytest-cov",
    "ruff>=0.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/soothe"]
artifacts = [
    "src/soothe/skills/**/*.md",
    "src/soothe/config/*.yml"
]

[tool.hatch.build.targets.sdist]
include = [
    "src/soothe/",
    "src/soothe/skills/**/*.md",
    "src/soothe/config/*.yml"
]
exclude = [
    "**/__pycache__",
    "**/*.pyc",
    "**/*.pyo",
]

[project.scripts]
soothe = "soothe.ux.cli.main:app"

[tool.ruff]
line-length = 120
exclude = []

[tool.ruff.format]

