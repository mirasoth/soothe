# Docker Compose for Soothe development environment
# RFC-612: Multi-database PostgreSQL architecture
services:
  pgvector:
    image: registry.cn-hangzhou.aliyuncs.com/lacogito/pgvector:pg17
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # RFC-612: No default database - init-db.sql creates multiple databases
      # POSTGRES_DB: vectordb  # Removed - using multi-database architecture
    ports:
      - "6432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/init-db.sql:/docker-entrypoint-initdb.d/10-init-databases.sql:ro

volumes:
  postgres_data:
