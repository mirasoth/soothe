# Soothe Configuration Template
# Use: soothe --config config/config.yml

# Model Providers - Define LLM providers with API keys (supports ${ENV_VAR} syntax)

providers:
  - name: openai
    provider_type: openai
    api_key: "${OPENAI_API_KEY}"
    # api_base_url: https://api.openai.com/v1
    models:
      - gpt-4o
      - gpt-4o-mini
      - o3-mini

  # OpenAI-compatible (DashScope, OpenRouter, vLLM):
  # - name: dashscope
  #   provider_type: openai
  #   api_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  #   api_key: "${DASHSCOPE_API_KEY}"
  #   models: [qwen-max]

  # LMStudio/Ollama (local models) - Limited tool_choice support, use provider_type: limited_openai
  # - name: lmstudio
  #   provider_type: limited_openai
  #   api_base_url: http://localhost:1234/v1
  #   api_key: "lmstudio"
  #   models: [google/gemma-4-26b-a4b]

  # Anthropic:
  # - name: anthropic
  #   provider_type: anthropic
  #   api_key: "${ANTHROPIC_API_KEY}"
  #   models: [claude-sonnet-4-20250514]

# Model Router - Maps purpose roles to "provider:model" (unset roles inherit from "default")

router:
  default: "openai:gpt-4o-mini"
  fast: "openai:gpt-4o-mini"
  think: "openai:o3-mini"
  image: "openai:gpt-4o"
  embedding: "openai:text-embedding-3-small"

# Autonomous Operation - Requires explicit user activation per thread (default: disabled)

autonomous:
  enabled_by_default: false
  max_iterations: 10
  max_retries: 2
  max_total_goals: 50        # RFC-0007 §5.6
  max_goal_depth: 5          # RFC-0007 §5.6
  enable_dynamic_goals: true # RFC-0007 §5.4

# Agentic Loop Configuration (RFC-201)

agentic:
  max_iterations: 10  # Default: 10, max: 50
  max_subagent_tasks_per_wave: 2  # Cap task completions per Execute wave (0 = unlimited, 1 = stop double-delegation)
  agent_loop_output_contract_enabled: true  # CoreAgent omits tool output during Execute phase
  final_response: adaptive  # adaptive | always_synthesize | always_last_execute (IG-199)
  prior_conversation_limit: 10  # Prior messages for Plan prompts (isolated threads)

  goal_context:
    plan_limit: 10  # Previous goals for Plan phase (range: 1-50)
    execute_limit: 10  # Previous goals for Execute briefing (thread switch)
    enabled: true

  working_memory:
    enabled: false
    max_inline_chars: 2000
    max_entry_chars_before_spill: 4000

  context_window_limit: 200000  # Claude models default (IG-151)

# Output Streaming Configuration (RFC-614) - Daemon → client real-time messaging

output_streaming:
  enabled: true
  mode: streaming  # streaming | batch
  execution_streaming: true
  synthesis_streaming: true
  tool_response_streaming: false  # Experimental

# Execution Limits - Concurrency and resource limits (0 = unlimited)

execution:
  concurrency:
    max_parallel_goals: 1
    max_parallel_steps: 3
    max_parallel_subagents: 3
    global_max_llm_calls: 9
    step_parallelism: dependency  # sequential | dependency | max
  recovery:
    progressive_checkpoints: true  # RFC-0010
    auto_resume_on_start: false

# Daemon Multi-Transport Configuration (RFC-0013) - WebSocket (required) + HTTP REST (optional)

daemon:
  transports:
    websocket:
      enabled: true
      host: "127.0.0.1"
      port: 8765
      tls_enabled: false
      cors_origins: ["http://localhost:*", "http://127.0.0.1:*"]
      max_frame_size: 10485760  # 10MB
    http_rest:
      enabled: false
      host: "127.0.0.1"
      port: 8766
      tls_enabled: false
      cors_origins: ["http://localhost:*", "http://127.0.0.1:*"]

  max_concurrent_threads: 100  # RFC-402
  max_input_queue_size: 1000  # IG-258: Prevents unbounded memory growth
  max_concurrent_dispatches: 50  # IG-258: Prevents task explosion

# Subagents - Enabled by default (set enabled: false to disable)

subagents:
  browser:
    enabled: true
    config:
      max_steps: 10  # Browser-use agent loop limit per delegated task
      runtime_dir: ""  # Empty = use SOOTHE_HOME/agents/browser/
      downloads_dir: ""  # Empty = runtime_dir/downloads/
      user_data_dir: ""  # Empty = runtime_dir/profiles/default/
      extensions_dir: ""  # Empty = runtime_dir/extensions/
      cleanup_on_exit: true  # Clean temp files on session end
      disable_extensions: true  # Disable uBlock Origin, cookie handler, ClearURLs
      disable_cloud: true  # Disable browser-use cloud service
      disable_telemetry: true  # Disable anonymous usage telemetry
      enable_existing_browser: true  # Allow connecting to existing Chrome via CDP
      profile_mode: ephemeral  # for concurrent browser tasks

  claude:
    enabled: true
    # Claude subagent uses ANTHROPIC_API_KEY and model from environment
    # Set environment variables: ANTHROPIC_API_KEY, ANTHROPIC_MODEL (optional)
    # No model configuration needed here

  research:
    enabled: true
    # Research subagent for deep multi-source iterative research
    # Uses the InquiryEngine for comprehensive investigation
    # No additional configuration needed - uses wizsearch tool settings

  explore:
    enabled: true
    # Explore subagent for targeted filesystem search (RFC-613)
    # Uses LLM-orchestrated iterative search with configurable thoroughness
    config:
      thoroughness: "medium"  # quick (2 iterations), medium (4), thorough (6)
      max_iterations:
        quick: 2
        medium: 4
        thorough: 6
      max_read_lines: 50  # Max lines per read_file call
      max_matches_returned: 5  # Max matches in final result

# =============================================================================
# Tools Configuration
# =============================================================================
# Enable/disable tool groups and configure their settings.
# Each tool group can be enabled/disabled via the 'enabled' flag.

tools:
  # Consolidated execution tools
  execution:
    enabled: true       # run_command, run_python, run_background, kill_process

  # Consolidated file operations (merged with surgical editing)
  file_ops:
    enabled: true       # delete_file, file_info, edit_file_lines, insert_lines, delete_lines, apply_diff
    # NOTE: read_file, write_file, search_files, list_files are provided by deepagents FilesystemMiddleware

  # Data operations
  datetime:
    enabled: true       # Current date/time for time-awareness
  data:
    enabled: true       # Inspect tabular data (CSV, Excel) and documents (PDF, DOCX)

  # Enhanced multi-engine search (formerly web_search, now wizsearch)
  wizsearch:
    enabled: true       # wizsearch_search, wizsearch_crawl
    default_engines:
      - tavily          # Requires TAVILY_API_KEY (tavily-only default)
    crawler: wizsearch    # Or jina, requires JINA_API_KEY
    max_results_per_engine: 10
    timeout: 30
  research:
    enabled: true       # Deep multi-source iterative research (InquiryEngine)

  # Optional tools (require API keys or external services):
  image:
    enabled: false   # Image analysis (OpenAI GPT-4o)
  audio:
    enabled: false   # Audio transcription (OpenAI Whisper)
  video:
    enabled: false   # Video analysis (Google Gemini)

# =============================================================================
# MCP Servers
# =============================================================================

mcp_servers: []
  # - command: npx
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
  #   transport: stdio
  # - url: http://localhost:3000/mcp
  #   transport: sse

# Plugins - Load via entry points, config declaration, or filesystem (~/.soothe/plugins/)

plugins: []
  # Example: Load a plugin via config declaration
  # - name: my-plugin
  #   enabled: true
  #   module: "my_package:MyPlugin"
  #   config:
  #     api_key: "${MY_API_KEY}"
  #     max_results: 10

  # Example: Disable a built-in plugin
  # - name: execution
  #   enabled: false

# Skills & Memory

skills: []
memory: []

# Security Configuration - Filesystem access control and security policies

security:
  allow_paths_outside_workspace: true
  require_approval_for_outside_paths: false

  # Path-based access control (glob patterns) - Evaluation: denied_paths > allowed_paths > workspace
  denied_paths:
    - "~/.ssh/**"
    - "~/.gnupg/**"
    - "~/.aws/**"
    - "**/.env"
    - "**/credentials.json"
    - "**/secrets.json"
  allowed_paths:
    - "**"  # Allow all (restrict for tighter security)

  denied_file_types: []
  require_approval_for_file_types: [".env", ".pem", ".key", ".p12", ".pfx", ".crt"]

protocols:
  planner:
    routing: auto  # auto | always_direct | always_planner | always_claude

  policy:
    profile: standard

  memory:
    enabled: true
    persist_dir: ""  # Empty = ~/.soothe/memory/
    llm_chat_role: fast
    llm_embed_role: embedding
    enable_embeddings: true
    enable_auto_categorization: true
    enable_category_summaries: true

  durability:
    thread_inactivity_timeout_hours: 72

# Persistence Configuration - Unified settings for protocol backends (RFC-612 multi-database architecture)

persistence:
  default_backend: sqlite  # sqlite (development) | postgresql (production)

  # RFC-612: PostgreSQL multi-database architecture
  # Uncomment for postgresql production setup:
  # postgres_base_dsn: "postgresql://user:pass@host:port"
  # postgres_databases:
  #   checkpoints: soothe_checkpoints  # LangGraph + AgentLoop checkpoints
  #   metadata: soothe_metadata        # DurabilityProtocol ThreadInfo
  #   vectors: soothe_vectors          # pgvector embeddings
  #   memory: soothe_memory            # MemU long-term memory

  # SQLite paths (used when default_backend: sqlite)
  # metadata_sqlite_path: ""   # Empty = $SOOTHE_DATA_DIR/metadata.db
  # checkpoint_sqlite_path: "" # Empty = $SOOTHE_DATA_DIR/checkpoints.db

# Vector Store Providers - Named backends for VectorContext (similar to LLM providers)
# Supports multiple providers: pgvector (production), sqlite_vec (development), weaviate

vector_stores:
  # PostgreSQL with pgvector extension (production, recommended)
  - name: pgvector_default
    provider_type: pgvector
    dsn: "postgresql://postgres:postgres@localhost:5432/vectordb"  # Required for pgvector
    pool_size: 5
    index_type: hnsw  # hnsw or ivfflat

  # SQLite with sqlite-vec extension (development, no external service required)
  # - name: sqlite_vec_default
  #   provider_type: sqlite_vec
  #   db_path: ""  # Optional: Empty uses $SOOTHE_DATA_DIR/vector.db
  #   vector_size: 1536  # Embedding dimension (adjust for your model)
  #   distance: cosine  # Distance metric: cosine, l2, or ip (inner product)

  # Weaviate vector database (alternative, cloud or self-hosted)
  # - name: weaviate_default
  #   provider_type: weaviate
  #   url: "http://localhost:8080"  # Weaviate server URL
  #   api_key: ""  # Optional: For Weaviate Cloud
  #   grpc_port: 50051  # gRPC port for better performance

vector_store_router:
  default: pgvector_default:soothe_default  # Format: "provider_name:collection_name"

# Performance & Startup - Tune agent startup and runtime optimizations

performance:
  enabled: true
  unified_classification: true
  classification_mode: llm
  optimize_system_prompts: true
  template_planning: true
  parallel_pre_stream: true
  parallel_tool_loading: true
  parallel_subagent_loading: true
  parallel_protocol_resolution: true
  reject_done_at_iteration_zero: false  # IG-053

# LLM Tracing - Request/response tracing for debugging (logs prompts, responses, tokens, latency)

llm_tracing:
  enabled: false
  log_preview_length: 200  # Max chars for message previews (50-1000)

# Logging & Observability

logging:
  file:
    level: INFO
    path: ""  # Empty = SOOTHE_HOME/logs/soothe.log
    max_bytes: 5242880  # 5MB before rotation
    backup_count: 3

  console:
    enabled: false  # Disabled by default for TUI compatibility
    level: WARNING
    stream: stderr
    format: "%(levelname)-8s %(name)s %(message)s"

  verbosity: normal  # minimal | normal | detailed | debug

  thread_logging:
    enabled: true
    dir: ""  # Empty = SOOTHE_DATA_DIR/threads/{thread_id}/logs/
    retention_days: 30
    max_size_mb: 100

  preview_defaults:
    chars: 200
    lines: 5
